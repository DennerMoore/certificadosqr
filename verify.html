<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Verificar Certificado</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<h1>Validação</h1>

<div id="resultado"></div>

<script>

const banco =
window.supabase.createClient(
"https://ntxfyzdumgozwtyufoor.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50eGZ5emR1bWdvend0eXVmb29yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjczNDEsImV4cCI6MjA5NjI0MzM0MX0.nL0kXMEsAdq9RC9QerUsf7xSnWUNegkYp4PGPkzQrKE"
);

async function verificar(){

const id =
new URLSearchParams(
window.location.search
).get("id");

const { data } =
await banco
.from("certificados")
.select("*")
.eq("id", id)
.single();

if(data){

document.getElementById(
"resultado"
).innerHTML = `
<h2>✓ Certificado válido</h2>

<p><b>Nome:</b>
${data.nome}</p>

<p><b>Empresa:</b>
${data.empresa}</p>

<p><b>Curso:</b>
${data.curso}</p>

<p><b>Validade:</b>
${data.validade}</p>
`;

}
else{

document.getElementById(
"resultado"
).innerHTML =
"<h2>❌ Certificado inválido</h2>";

}

}

verificar();

</script>

</body>
</html>
