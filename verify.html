<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Verificar Certificado</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{

font-family: Arial, sans-serif;
background:#f4f7fb;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

margin:0;

}

.card{

background:white;

padding:40px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.1);

max-width:700px;

width:90%;

text-align:center;

}

.valido{

border-top:8px solid #22c55e;

}

.expirado{

border-top:8px solid #f59e0b;

}

.invalido{

border-top:8px solid #ef4444;

}

h2{

margin-top:0;

}

.info{

text-align:left;

margin-top:25px;

}

</style>

</head>

<body>

<h1>Validação</h1>

<div id="resultado"></div>

<script>

const banco =
window.supabase.createClient(
"https://ntxfyzdumgozwtyufoor.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50eGZ5emR1bWdvend0eXVmb29yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjczNDEsImV4cCI6MjA5NjI0MzM0MX0.nL0kXMEsAdq9RC9QerUsf7xSnWUNegkYp4PGPkzQrKE"
);

async function verificar(){

const id =
new URLSearchParams(
window.location.search
).get("id");

const { data } =
await banco
.from("certificados")
.select("*")
.eq("id", id)
.single();

if(data){

document.getElementById(
"resultado"
).innerHTML = `
<h2>✓ Certificado válido</h2>

<p><b>Nome:</b>
${data.nome}</p>

<p><b>Empresa:</b>
${data.empresa}</p>

<p><b>Curso:</b>
${data.curso}</p>

<p><b>Validade:</b>
${data.validade}</p>
`;

}
else{

document.getElementById(
"resultado"
).innerHTML =
"<h2>❌ Certificado inválido</h2>";

}

}

verificar(){
  const hoje = new Date();

const validade =
new Date(data.validad);

if(validade < hoje){

document.getElementById(
"resultado"
).innerHTML = `
<div class="card expirado">

<h2>⚠️ Certificado Expirado</h2>

<p>
Este certificado foi emitido
legitimamente, porém sua validade
já expirou.
</p>

<p>
Validade:
${data.validad}
</p>

</div>
`;

return;
}
  ;

</script>

</body>
</html>
