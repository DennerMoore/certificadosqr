<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Validação de Certificado</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{

margin:0;
padding:0;

font-family:Arial,sans-serif;

background:#f4f7fb;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

}

.card{

background:white;

padding:40px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,.1);

max-width:700px;
width:90%;

text-align:center;

}

.valido{

border-top:8px solid #22c55e;

}

.expirado{

border-top:8px solid #f59e0b;

}

.invalido{

border-top:8px solid #ef4444;

}

.info{

text-align:left;

margin-top:25px;

}

.info p{

margin:10px 0;

}

h2{

margin-top:0;

}

</style>

</head>

<body>

<div id="resultado">

<div class="card">

<h2>Carregando certificado...</h2>

</div>

</div>

<script>

const banco =
window.supabase.createClient(
"https://ntxfyzdumgozwtyufoor.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50eGZ5emR1bWdvend0eXVmb29yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjczNDEsImV4cCI6MjA5NjI0MzM0MX0.nL0kXMEsAdq9RC9QerUsf7xSnWUNegkYp4PGPkzQrKE"
);

async function verificar(){

const id =
new URLSearchParams(
window.location.search
).get("id");

if(!id){

document.getElementById(
"resultado"
).innerHTML = `

<div class="card invalido">

<h2>❌ Certificado Inválido</h2>

<p>
Nenhum identificador foi informado.
</p>

</div>

`;

return;

}

const { data, error } =
await banco
.from("certificados")
.select("*")
.eq("id", id)
.single();

if(error || !data){

document.getElementById(
"resultado"
).innerHTML = `

<div class="card invalido">

<h2>❌ Certificado Não Encontrado</h2>

<p>
O certificado informado não existe
em nossa base de dados.
</p>

</div>

`;

return;

}

const hoje = new Date();

const validade =
new Date(data.validade);

if(validade < hoje){

document.getElementById(
"resultado"
).innerHTML = `

<div class="card expirado">

<h2>⚠️ Certificado Expirado</h2>

<p>
Este certificado foi emitido
corretamente, porém sua validade
já expirou.
</p>

<div class="info">

<p><b>Nome:</b>
${data.nome}</p>

<p><b>Empresa:</b>
${data.empresa}</p>

<p><b>Curso:</b>
${data.curso}</p>

<p><b>Emissão:</b>
${data.emissao}</p>

<p><b>Validade:</b>
${data.validade}</p>

<p><b>ID:</b>
${data.id}</p>

</div>

</div>

`;

return;

}

document.getElementById(
"resultado"
).innerHTML = `

<div class="card valido">

<h2>✅ Certificado Verificado</h2>

<p>
Este certificado foi validado
com sucesso.
</p>

<div class="info">

<p><b>Nome:</b>
${data.nome}</p>

<p><b>Empresa:</b>
${data.empresa}</p>

<p><b>Curso:</b>
${data.curso}</p>

<p><b>Emissão:</b>
${data.emissao}</p>

<p><b>Validade:</b>
${data.validade}</p>

<p><b>ID:</b>
${data.id}</p>

</div>

</div>

`;

}

verificar();

</script>

</body>
</html>
