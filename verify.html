<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Validación de Certificado</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
"Segoe UI",
sans-serif;

background:
linear-gradient(
135deg,
#f8fafc,
#e2e8f0
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;

}

.card{

background:white;

width:100%;
max-width:900px;

padding:45px;

border-radius:24px;

box-shadow:
0 20px 60px rgba(
0,
0,
0,
0.08
);

text-align:center;

animation:
fade .4s ease;

}

@keyframes fade{

from{
opacity:0;
transform:
translateY(15px);
}

to{
opacity:1;
transform:
translateY(0);
}

}

.logo{

max-width:200px;

margin-bottom:25px;

}

.valido{

border-top:
10px solid #22c55e;

}

.expirado{

border-top:
10px solid #f59e0b;

}

.invalido{

border-top:
10px solid #ef4444;

}

.status{

font-size:70px;

margin-bottom:10px;

}

.badge{

display:inline-block;

padding:8px 18px;

border-radius:999px;

font-size:14px;

font-weight:700;

margin-bottom:20px;

}

.badge-valido{

background:#dcfce7;
color:#15803d;

}

.badge-expirado{

background:#fef3c7;
color:#b45309;

}

.badge-invalido{

background:#fee2e2;
color:#b91c1c;

}

h2{

margin-bottom:15px;

font-size:32px;

color:#0f172a;

}

.descricao{

color:#64748b;

margin-bottom:30px;

}

.info{

display:grid;

grid-template-columns:
1fr 1fr;

gap:15px;

margin-top:25px;

text-align:left;

}

.campo{

background:#f8fafc;

padding:15px;

border-radius:12px;

}

.campo span{

display:block;

font-size:12px;

font-weight:700;

color:#64748b;

text-transform:uppercase;

margin-bottom:5px;

}

.campo strong{

color:#0f172a;

}

.id-cert{

font-family:
Consolas,
monospace;

font-size:13px;

word-break:break-all;

}

.consulta{

margin-top:30px;

font-size:13px;

color:#64748b;

}

.footer{

margin-top:25px;

padding-top:20px;

border-top:
1px solid #e2e8f0;

font-size:12px;

color:#94a3b8;

}

@media(max-width:700px){

.info{

grid-template-columns:
1fr;

}

.card{

padding:25px;

}

}
</style>

</head>

<body>

<div id="resultado">

<div class="card">

<h2>Cargando certificado...</h2>

</div>

</div>

<script>

const banco =
window.supabase.createClient(
"https://ntxfyzdumgozwtyufoor.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50eGZ5emR1bWdvend0eXVmb29yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjczNDEsImV4cCI6MjA5NjI0MzM0MX0.nL0kXMEsAdq9RC9QerUsf7xSnWUNegkYp4PGPkzQrKE"
);

async function verificar(){

const id =
new URLSearchParams(
window.location.search
).get("id");

const dataConsulta =
new Date().toLocaleString(
"pt-BR"
);

if(!id){

document.getElementById(
"resultado"
).innerHTML = `

<div class="card valido">

<img
src="logo.png"
class="logo">

<div class="status">
✅
</div>

<div class="badge badge-valido">
CERTIFICADO VÁLIDO
</div>

<h2>
Certificado Verificado
</h2>

<p class="descricao">
Este certificado ha sido validado correctamente
en nuestra base de datos.
</p>

<div class="info">

<div class="campo">
<span>Participante</span>
<strong>${data.nome}</strong>
</div>

<div class="campo">
<span>Empresa</span>
<strong>${data.empresa}</strong>
</div>

<div class="campo">
<span>Curso</span>
<strong>${data.curso}</strong>
</div>

<div class="campo">
<span>Fecha de Emisión</span>
<strong>${data.emissao}</strong>
</div>

<div class="campo">
<span>Fecha de Caducidad</span>
<strong>${data.validade}</strong>
</div>

<div class="campo">
<span>ID del Certificado</span>
<strong class="id-cert">
${data.id}
</strong>
</div>

</div>

<div class="consulta">

Consulta realizada:
${dataConsulta}

</div>

<div class="footer">

Sistema Oficial de Validación Digital

</div>

</div>

`;

return;

}

console.log("ID recebido:", id);

const { data, error } =
await banco
.from("certificados")
.select("*")
.eq("id", id)
.single();

console.log(data);
console.log(error);

if(error || !data){

document.getElementById(
"resultado"
).innerHTML = `

<div class="card invalido">

<img
src="logo.png"
class="logo">

<h2>❌ Certificado No Encontrado</h2>

<p>
No existe ningún certificado
con este identificador.
</p>

</div>

`;

return;

}

if(data.ativo === false){

document.getElementById(
"resultado"
).innerHTML = `

<div class="card invalido">

<img
src="logo.png"
class="logo">

<h2>🚫 Certificado Revocado</h2>

<p>
Este certificado fue revocado
y ya no posee validez.
</p>

<div class="info">

<p><b>Nombre:</b>
${data.nome}</p>

<p><b>Empresa:</b>
${data.empresa}</p>

<p><b>Tipo de Certificado:</b>
${data.curso}</p>

<p><b>ID:</b>
${data.id}</p>

</div>

<div class="consulta">
Consulta realizada en:
${dataConsulta}
</div>

</div>

`;

return;

}

verificar();
  
</script>

</body>

</html>
